<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filmauswahl</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1c2537;
      --border: #1e2d45;
      --accent: #1a6fff;
      --accent2: #0ea5e9;
      --selected: #1a6fff;
      --text: #e8eaf0;
      --text-muted: #7b8ab0;
      --radius: 10px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ─────────────────────────────── */
    .header {
      background: rgba(4, 7, 17, 0.95);
      padding: 14px 48px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: padding 0.3s, box-shadow 0.3s;
    }

    .header.scrolled {
      padding: 4px 48px 4px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .header.scrolled .header-top {
      display: none;
    }

    .header.scrolled h1 {
      display: none;
    }

    .header.scrolled p {
      display: none;
    }

    .header.scrolled .controls {
      margin-top: 0;
      gap: 8px;
    }

    .header.scrolled .genre-filter {
      max-height: 28px;
      overflow: hidden;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }


    .zaehler-badge {
      background: var(--accent);
      color: white;
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.3s;
    }

    .zaehler-badge.voll {
      background: linear-gradient(135deg, #1a6fff, #0ea5e9);
      box-shadow: 0 0 20px rgba(26, 111, 255, 0.4);
    }

    /* ── Suche + Filter ─────────────────────── */
    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .suche-wrapper {
      position: relative;
    }

    .suche-wrapper::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.5;
    }

    #suche {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      padding: 7px 14px 7px 36px;
      width: 220px;
      transition: border-color 0.2s;
      outline: none;
    }

    #suche:focus {
      border-color: var(--accent);
    }

    #suche::placeholder {
      color: var(--text-muted);
    }

    .genre-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .genre-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 13px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .genre-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .genre-btn.aktiv {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* ── Film Grid ──────────────────────────── */
    .grid-container {
      padding: 16px 48px 100px;
    }

    #filmliste {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 16px;
    }

    .film-karte {
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .film-karte:hover {
      transform: translateY(-4px);
      border-color: var(--border);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .film-karte.ausgewaehlt {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 12px 32px rgba(26, 111, 255, 0.2);
    }

    .film-karte .haken {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      line-height: 26px;
      font-size: 14px;
      text-align: center;
      z-index: 3;
      box-shadow: 0 2px 8px rgba(26, 111, 255, 0.5);
    }

    .film-karte.ausgewaehlt .haken {
      display: block;
    }

    .film-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .film-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 32px;
    }

    .film-info {
      padding: 10px 10px 12px;
    }

    .film-titel-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .film-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Weiter Button ──────────────────────── */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, #040711 60%, transparent);
      padding: 24px 48px 28px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      z-index: 99;
    }

    .footer-text {
      color: var(--text-muted);
      font-size: 14px;
    }

    #weiter-btn {
      background: linear-gradient(135deg, #1a6fff, #0ea5e9);
      border: none;
      border-radius: var(--radius);
      color: white;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 36px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    #weiter-btn:hover:not(:disabled) {
      box-shadow: 0 0 24px rgba(26, 111, 255, 0.5);
      transform: translateY(-1px);
    }

    #weiter-btn:disabled {
      background: var(--surface2);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>

    ];

    const filme = alleFilme.filter(f => f.liste === 'auswahl');
    const empfehlungsPool = alleFilme.filter(f => f.liste === 'empfehlung');
    let ausgewaehlt = [];
    let aktivesGenre = 'Alle';
    let nurAusgewaehlt = false;

    function aehnlichkeitBerechnen(film1, film2) {
      let score = 0;
      film1.genres.forEach(g => { if (film2.genres.includes(g)) score += 3; });
      film1.stimmung.forEach(s => { if (film2.stimmung.includes(s)) score += 2; });
      film1.themen.forEach(t => { if (film2.themen.includes(t)) score += 1; });
      if (film1.tempo === film2.tempo) score += 1;
      return score;
    }

    function empfehlungenBerechnen(ausgewaehlt) {
      let scores = {};
      empfehlungsPool.forEach(kandidat => {
        if (ausgewaehlt.some(a => a.id === kandidat.id)) return;
        let gesamtScore = 0;
        ausgewaehlt.forEach(liebling => {
          gesamtScore += aehnlichkeitBerechnen(liebling, kandidat);
        });
        scores[kandidat.id] = { film: kandidat, score: gesamtScore };
      });
      return Object.values(scores)
        .sort((a, b) => b.score - a.score)
        .slice(0, 1)
        .map(e => e.film);
    }

    function toggleAusgewaehltFilter() {
      nurAusgewaehlt = !nurAusgewaehlt;
      let btn = document.getElementById('ausgewaehlt-filter-btn');
      if (nurAusgewaehlt) {
        btn.style.background = 'var(--accent)';
        btn.style.color = 'white';
      } else {
        btn.style.background = '';
        btn.style.color = 'var(--accent)';
      }
      filternUndAnzeigen();
    }

    function genresErstellen() {
      let alleGenres = ['Alle'];
      filme.forEach(film => {
        film.genres.forEach(g => {
          if (!alleGenres.includes(g)) alleGenres.push(g);
        });
      });
      let container = document.getElementById('genre-filter');
      alleGenres.forEach(genre => {
        let btn = document.createElement('button');
        btn.className = 'genre-btn' + (genre === 'Alle' ? ' aktiv' : '');
        btn.innerText = genre;
        btn.onclick = () => genreWaehlen(genre);
        container.appendChild(btn);
      });
    }

    function genreWaehlen(genre) {
      aktivesGenre = genre;
      document.querySelectorAll('.genre-btn').forEach(btn => {
        btn.classList.toggle('aktiv', btn.innerText === genre);
      });
      filternUndAnzeigen();
    }

    function filternUndAnzeigen() {
      let suchtext = document.getElementById('suche').value.toLowerCase();
      let gefiltert = filme.filter(film => {
        let passtGenre = aktivesGenre === 'Alle' || film.genres.includes(aktivesGenre);
        let pasttSuche = film.titel.toLowerCase().includes(suchtext);
        let passtAuswahl = !nurAusgewaehlt || ausgewaehlt.some(f => f.id === film.id);
        return passtGenre && pasttSuche && passtAuswahl;
      });
      let container = document.getElementById('filmliste');
      container.innerHTML = '';
      gefiltert.forEach(film => {
        let karte = document.createElement('div');
        karte.className = 'film-karte' + (ausgewaehlt.some(f => f.id === film.id) ? ' ausgewaehlt' : '');
        karte.innerHTML = `
          <div class="haken">✓</div>
          ${film.poster
            ? `<img class="film-poster" src="${film.poster}" alt="${film.titel}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''}
          <div class="film-poster-placeholder" style="${film.poster ? 'display:none' : ''}">🎬</div>
          <div class="film-info">
            <div class="film-titel-text">${film.titel}</div>
            <div class="film-meta">${film.jahr || ''}${film.jahr && film.laufzeit ? ' · ' : ''}${film.laufzeit ? film.laufzeit + ' Min' : ''}</div>
          </div>`;
        karte.onclick = () => filmKlick(film, karte);
        container.appendChild(karte);
      });
    }

    function filmKlick(film, karte) {
      if (ausgewaehlt.some(f => f.id === film.id)) {
        ausgewaehlt = ausgewaehlt.filter(f => f.id !== film.id);
        karte.classList.remove('ausgewaehlt');
      } else if (ausgewaehlt.length < 10) {
        ausgewaehlt.push(film);
        karte.classList.add('ausgewaehlt');
      } else {
        alert('Du hast bereits 10 Filme ausgewählt. Wähle zuerst einen ab.');
        return;
      }
      let n = ausgewaehlt.length;
      document.getElementById('zaehler').innerText = n + ' / 10 ausgewählt';
      document.getElementById('zaehler').className = 'zaehler-badge' + (n === 10 ? ' voll' : '');
      document.getElementById('footer-text').innerText = n === 10 ? 'Bereit! Klicke auf Weiter.' : `Noch ${10 - n} weitere auswählen`;
      document.getElementById('weiter-btn').disabled = n < 10;
      document.getElementById('ausgewaehlt-filter-btn').innerText = '★ Ausgewählt (' + n + ')';
      if (nurAusgewaehlt) filternUndAnzeigen();
    }

    // Framing-Texte pro Bedingung (später anpassen)
    const framingTexte = {
      //control = w
      'control': '',
      //social_proof = x
      'social_proof': '87 % der Nutzer in dieser Befragung haben diesen Film mit 4 oder 5 Sternen bewertet.',
      //authority = y
      'authority': 'Dieser Film hat auf IMDb ein Rating von 8.9 / 10.',
      //commitment = z
      'commitment': 'Basierend auf deiner Auswahl der 10 Filme passt dieser Film genau zu deinem Geschmack.',
    };

    // Aktive Bedingung — hier später per URL-Parameter oder Zufallszuweisung setzen
    const urlParams = new URLSearchParams(window.location.search);
    let aktiveBedingung = urlParams.get('condition') || 'control';

    function weiter() {
      let empfehlungen = empfehlungenBerechnen(ausgewaehlt);

      // Framing
      let framing = framingTexte[aktiveBedingung] || '';
      const borderColor = { social_proof: '#1D9E75', authority: '#378ADD', commitment: '#7F77DD' }[aktiveBedingung] || 'transparent';
      const bgColor = { social_proof: 'rgba(29,158,117,0.08)', authority: 'rgba(55,138,221,0.08)', commitment: 'rgba(127,119,221,0.08)' }[aktiveBedingung] || 'transparent';

      // Empfehlung rendern (Hero-Layout)
      let empGrid = document.getElementById('emp-grid');
      empGrid.innerHTML = '';
      empfehlungen.forEach(film => {
        empGrid.innerHTML += `
          <img src="${film.poster}" alt="${film.titel}" style="width:180px;aspect-ratio:2/3;object-fit:cover;border-radius:10px;flex-shrink:0;" onerror="this.style.display='none'">
          <div style="flex:1;padding-top:4px;">
            <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;">${film.titel}</div>
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">${film.jahr || ''}${film.jahr && film.laufzeit ? ' · ' : ''}${film.laufzeit ? film.laufzeit + ' Min' : ''}</div>
            ${framing ? `<div style="border-left:3px solid ${borderColor};background:${bgColor};padding:12px 16px;margin-bottom:18px;border-radius:0;"><div style="font-size:14px;line-height:1.6;color:#b0b8cc;">${framing}</div></div>` : ''}
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${film.genres.map(g => `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text-muted);font-size:11px;padding:3px 10px;">${g}</span>`).join('')}
            </div>
          </div>`;
      });

      // Lieblingsfilme rendern
      let ausGrid = document.getElementById('aus-grid');
      ausGrid.innerHTML = '';
      ausgewaehlt.forEach(film => {
        ausGrid.innerHTML += `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;opacity:0.7;">
            ${film.poster ? `<img src="${film.poster}" alt="${film.titel}" style="width:100%;aspect-ratio:2/3;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
            <div style="width:100%;aspect-ratio:2/3;background:var(--surface2);display:${film.poster ? 'none' : 'flex'};align-items:center;justify-content:center;font-size:24px;">🎬</div>
            <div style="padding:7px 8px 9px;font-size:11px;font-weight:500;color:var(--text-muted);line-height:1.3;">${film.titel}</div>
          </div>`;
      });

      // Empfehlungsseite zeigen
      document.getElementById('empfehlungs-seite').style.display = 'block';
      document.getElementById('empfehlungs-seite').scrollTop = 0;

      function zurueckZuFragebogen() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('return');
        if (token) {
          window.location.href = "https://www.soscisurvey.de/TG_Bachelorarbeit/?i=" + token;
        } else {
          alert('Kein Rückkehr-Token gefunden. Bitte kehre manuell zum Fragebogen zurück.');
        }
      }
    }

    genresErstellen();
    filternUndAnzeigen();

    // Scroll-Effekt für Header
    window.addEventListener('scroll', () => {
      const header = document.querySelector('.header');
      if (window.scrollY > 60) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });
  </script>

  <!-- ═══════════════════════════════════════════════════════
       EMPFEHLUNGSSEITE (wird per JS ein-/ausgeblendet)
  ═══════════════════════════════════════════════════════ -->
  <div id="empfehlungs-seite"
    style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg); overflow-y:auto; z-index:200;">

    <div class="header">
      <div class="header-top">
        <div style="font-size:15px; font-weight:600; color:var(--text);">Deine Filmempfehlungen</div>
        <button onclick="zurueck()"
          style="background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer; font-family:Outfit,sans-serif; font-size:13px; padding:7px 16px;">←
          Zurück</button>
      </div>
    </div>

    <div style="padding:32px 48px 60px;">

      <p
        style="font-size:13px; color:var(--text-muted); margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border); line-height:1.6;">
        Wir haben dir einen Film empfohlen. Bitte sieh dir die Empfehlung an.</p>

      <!-- Hero Layout -->
      <div id="emp-grid" style="display:flex; gap:28px; align-items:flex-start; margin-bottom:48px;"></div>

      <!-- Ausgewählte Filme -->
      <div
        style="font-size:11px; font-weight:600; margin-bottom:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted);">
        Deine Auswahl</div>
      <div id="aus-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:10px;">
      </div>

      <div style="display:flex; justify-content:flex-end; margin-top:40px; padding-bottom:20px;">
        <button onclick="zurueckZuFragebogen()"
          style="background:linear-gradient(135deg,#1a6fff,#0ea5e9);border:none;border-radius:10px;color:white;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;padding:13px 36px;">
          Weiter zum Fragebogen →
        </button>
      </div>

    </div>
  </div>

</body>

</html>
